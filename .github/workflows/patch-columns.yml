name: Patch Country Columns

on:
  workflow_dispatch:
    inputs:
      countries:
        description: 'Comma-separated country codes (e.g., PNG,FJI). Leave empty to use all active countries from Snowflake.'
        required: false
        default: ''
        type: string
      columns:
        description: 'Space-separated columns to patch (e.g., "num_shelters num_wash" or "built_surface_m2 rwi"). Supported: population, school_age_population, infant_population, under_18_population, built_surface_m2, smod_class, smod_class_l1, rwi, num_schools, num_hcs, num_shelters, num_wash'
        required: true
        type: string
      zoom_level:
        description: 'Zoom level matching the existing mercator parquet (default: 14)'
        required: false
        default: '14'
        type: string

jobs:
  patch-columns:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get countries list
        id: get_countries
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          if [ -z "${{ inputs.countries }}" ]; then
            COUNTRIES=$(python -c "
            from country_utils import get_active_countries_from_snowflake
            countries = get_active_countries_from_snowflake()
            print(' '.join(countries))
            ")
            echo "countries=$COUNTRIES" >> $GITHUB_OUTPUT
          else
            # Convert comma-separated to space-separated
            COUNTRIES=$(echo "${{ inputs.countries }}" | tr ',' ' ')
            echo "countries=$COUNTRIES" >> $GITHUB_OUTPUT
          fi

      - name: Patch columns
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          DATA_PIPELINE_DB: ${{ secrets.DATA_PIPELINE_DB }}
          SNOWFLAKE_STAGE_NAME: ${{ secrets.SNOWFLAKE_STAGE_NAME }}
          GIGA_SCHOOL_LOCATION_API_KEY: ${{ secrets.GIGA_SCHOOL_LOCATION_API_KEY }}
          HEALTHSITES_API_KEY: ${{ secrets.HEALTHSITES_API_KEY }}
          GEOREPO_API_KEY: ${{ secrets.GEOREPO_API_KEY }}
          GEOREPO_USER_EMAIL: ${{ secrets.GEOREPO_USER_EMAIL }}
        run: |
          python main_pipeline.py \
            --type patch \
            --countries ${{ steps.get_countries.outputs.countries }} \
            --zoom ${{ inputs.zoom_level }} \
            --columns ${{ inputs.columns }}
