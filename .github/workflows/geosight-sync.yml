name: GeoSight Sync

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # 00/06/12/18 UTC — 3h after TC pipeline runs (03/09/15/21 UTC)
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill mode — upload without dedup'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      country:
        description: 'Restrict to one country ISO3 (e.g. SLB). Leave empty for all.'
        required: false
        default: ''
        type: string
      from_date:
        description: 'From date filter YYYY-MM-DD (optional)'
        required: false
        default: ''
        type: string
      to_date:
        description: 'To date filter YYYY-MM-DD (optional)'
        required: false
        default: ''
        type: string
      date:
        description: 'Exact forecast date YYYY-MM-DD (optional)'
        required: false
        default: ''
        type: string

jobs:
  geosight-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync to GeoSight
        env:
          DATA_PIPELINE_DB: ${{ secrets.DATA_PIPELINE_DB }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_STAGE_NAME: ${{ secrets.SNOWFLAKE_STAGE_NAME }}
          GEOSIGHT_BASE_URL: ${{ secrets.GEOSIGHT_BASE_URL }}
          GEOSIGHT_API_KEY: ${{ secrets.GEOSIGHT_API_KEY }}
          GEOSIGHT_USER_EMAIL: ${{ secrets.GEOSIGHT_USER_EMAIL }}
        run: |
          CMD="python geosight/upload_admin_related_table.py"

          if [ "${{ inputs.backfill }}" = "true" ]; then
            CMD="$CMD --backfill"
          fi
          if [ -n "${{ inputs.country }}" ]; then
            CMD="$CMD --country ${{ inputs.country }}"
          fi
          if [ -n "${{ inputs.date }}" ]; then
            CMD="$CMD --date ${{ inputs.date }}"
          fi
          if [ -n "${{ inputs.from_date }}" ]; then
            CMD="$CMD --from-date ${{ inputs.from_date }}"
          fi
          if [ -n "${{ inputs.to_date }}" ]; then
            CMD="$CMD --to-date ${{ inputs.to_date }}"
          fi

          echo "Running: $CMD"
          $CMD
