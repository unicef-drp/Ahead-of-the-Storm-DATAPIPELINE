name: Update Country Config

on:
  workflow_dispatch:
    inputs:
      country_code:
        description: 'ISO3 country code (e.g., TWN, DOM, VNM)'
        required: true
        type: string
      country_name:
        description: 'Full country name override (e.g., Taiwan). Leave empty to skip.'
        required: false
        type: string
      center_lat:
        description: 'Latitude for map center (e.g., 18.74). Leave empty to skip.'
        required: false
        type: string
      center_lon:
        description: 'Longitude for map center (e.g., -70.16). Leave empty to skip.'
        required: false
        type: string
      view_zoom:
        description: 'Zoom level for visualization map (e.g., 8). Leave empty to skip.'
        required: false
        type: string

jobs:
  update-country-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update country configuration
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          python -c "
          from country_utils import update_country_config

          country_name_str = '${{ inputs.country_name }}'.strip()
          center_lat_str   = '${{ inputs.center_lat }}'.strip()
          center_lon_str   = '${{ inputs.center_lon }}'.strip()
          view_zoom_str    = '${{ inputs.view_zoom }}'.strip()

          country_name = country_name_str if country_name_str else None
          center_lat   = float(center_lat_str) if center_lat_str else None
          center_lon   = float(center_lon_str) if center_lon_str else None
          view_zoom    = int(view_zoom_str)     if view_zoom_str  else None

          if not any([country_name, center_lat is not None, center_lon is not None, view_zoom is not None]):
              print('Error: at least one field must be provided')
              exit(1)

          success = update_country_config(
              '${{ inputs.country_code }}',
              country_name=country_name,
              center_lat=center_lat,
              center_lon=center_lon,
              view_zoom=view_zoom,
          )
          if success:
              print('Country config updated successfully')
          else:
              print('Failed to update country config')
              exit(1)
          "

      - name: Verify update
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          python -c "
          from snowflake_utils import get_snowflake_connection
          import pandas as pd

          conn = get_snowflake_connection()
          query = '''
              SELECT COUNTRY_CODE, COUNTRY_NAME, CENTER_LAT, CENTER_LON, VIEW_ZOOM
              FROM PIPELINE_COUNTRIES
              WHERE COUNTRY_CODE = '${{ inputs.country_code }}'
          '''
          df = pd.read_sql(query, conn)
          conn.close()

          if len(df) > 0:
              row = df.iloc[0]
              print(f'Country: {row[\"COUNTRY_CODE\"]} ({row[\"COUNTRY_NAME\"]})')
              print(f'Center: [{row[\"CENTER_LAT\"]}, {row[\"CENTER_LON\"]}]')
              print(f'View Zoom: {row[\"VIEW_ZOOM\"]}')
          else:
              print('Country not found in table')
              exit(1)
          "
